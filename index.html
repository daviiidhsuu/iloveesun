    <div class="container">

        const btnShowAnswer = document.getElementById('btnShowAnswer');
        const progressDisplay = document.getElementById('progressDisplay');

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function generateQuestion() {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = 180;
            timerDisplay.innerText = formatTime(timeLeft);
            timerDisplay.style.color = "#e74c3c";
            explanationBox.style.display = "none";
            btnShowAnswer.style.display = "none";
            btnStart.disabled = false;

            if (questionQueue.length === 0) {
                questionQueue = shuffleArray(questionBank);
                drawnCount = 0;
            }
            drawnCount++;
            currentQuestionObj = questionQueue.pop();
            questionText.innerText = currentQuestionObj.question;
            explanationText.innerHTML = currentQuestionObj.explanation;
            progressDisplay.innerText = `第 ${drawnCount} / ${questionBank.length} 題（本輪剩餘 ${questionQueue.length} 題）`;
        }

        function startTimer() {
            btnStart.disabled = true;
            btnShowAnswer.style.display = "inline-block";

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);

                if (timeLeft <= 30) {
                    timerDisplay.style.color = "#c0392b";
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showExplanation();
                }
            }, 1000);
        }

        function showExplanation() {
            if (timerInterval) clearInterval(timerInterval);
            timerDisplay.innerText = "00:00";
            explanationBox.style.display = "block";
            btnShowAnswer.style.display = "none";
        }
